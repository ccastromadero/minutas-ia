<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minutas IA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e8b0;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --recording: #ff4757;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    transition: all 0.3s;
  }
  .status-pill.active { border-color: var(--recording); color: var(--recording); }
  .status-pill.active .dot { background: var(--recording); animation: pulse 1s infinite; }
  .status-pill.transcribing { border-color: var(--accent3); color: var(--accent3); }
  .status-pill.transcribing .dot { background: var(--accent3); }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  /* Meeting info */
  .meeting-info {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }
  .field:first-child { grid-column: 1 / -1; }

  /* Recording area */
  .recorder {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 24px;
    text-align: center;
  }

  .record-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 0 0 0 rgba(108,99,255,0.4);
    margin-bottom: 16px;
    position: relative;
  }
  .record-btn:hover { transform: scale(1.05); }
  .record-btn.recording {
    background: var(--recording);
    animation: recordPulse 2s infinite;
    box-shadow: 0 0 0 0 rgba(255,71,87,0.4);
  }
  .record-btn svg { width: 32px; height: 32px; fill: white; }

  @keyframes recordPulse {
    0% { box-shadow: 0 0 0 0 rgba(255,71,87,0.4); }
    70% { box-shadow: 0 0 0 20px rgba(255,71,87,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,71,87,0); }
  }

  .record-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .record-label strong { color: var(--text); display: block; font-size: 16px; margin-bottom: 4px; font-family: 'Syne', sans-serif; }

  .timer {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -1px;
    margin: 16px 0 8px;
  }
  .timer.active { color: var(--recording); }

  /* Waveform */
  .waveform {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    height: 40px;
    margin: 12px 0;
  }
  .waveform .bar {
    width: 3px;
    border-radius: 2px;
    background: var(--accent);
    opacity: 0.3;
    height: 4px;
    transition: height 0.1s;
  }
  .waveform.active .bar {
    opacity: 0.8;
    animation: wave 1.2s ease-in-out infinite;
  }
  .waveform .bar:nth-child(1) { animation-delay: 0s; }
  .waveform .bar:nth-child(2) { animation-delay: 0.1s; }
  .waveform .bar:nth-child(3) { animation-delay: 0.2s; }
  .waveform .bar:nth-child(4) { animation-delay: 0.3s; }
  .waveform .bar:nth-child(5) { animation-delay: 0.4s; }
  .waveform .bar:nth-child(6) { animation-delay: 0.3s; }
  .waveform .bar:nth-child(7) { animation-delay: 0.2s; }
  .waveform .bar:nth-child(8) { animation-delay: 0.1s; }
  .waveform .bar:nth-child(9) { animation-delay: 0s; }

  @keyframes wave {
    0%, 100% { height: 4px; }
    50% { height: 32px; }
  }

  /* Transcript */
  .transcript-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .transcript-body {
    padding: 24px;
    min-height: 120px;
    max-height: 300px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .transcript-body:empty::before,
  .transcript-placeholder {
    content: attr(data-placeholder);
    color: var(--muted);
    font-style: italic;
  }

  textarea.transcript-editable {
    width: 100%;
    min-height: 150px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.8;
    resize: vertical;
    padding: 24px;
  }
  textarea.transcript-editable::placeholder { color: var(--muted); }

  /* Generate button */
  .generate-btn {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .generate-btn:hover:not(:disabled) { background: #7c74ff; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(108,99,255,0.3); }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Minutes output */
  .minutes-output {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: none;
  }
  .minutes-output.visible { display: block; animation: fadeUp 0.4s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .minutes-content {
    padding: 32px;
    font-size: 13px;
    line-height: 1.9;
  }
  .minutes-content h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 4px;
  }
  .minutes-content .meta {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .minutes-content h2 {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 28px 0 12px;
  }
  .minutes-content p { color: var(--text); margin-bottom: 8px; }
  .minutes-content ul { padding-left: 20px; }
  .minutes-content li { color: var(--text); margin-bottom: 6px; }
  .minutes-content li::marker { color: var(--accent3); }
  .minutes-content strong { color: var(--accent3); font-weight: 500; }

  /* Actions */
  .output-actions {
    display: flex;
    gap: 10px;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
  }
  .action-btn {
    flex: 1;
    padding: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* No speech API warning */
  .warning {
    background: rgba(255,101,132,0.08);
    border: 1px solid rgba(255,101,132,0.2);
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 12px;
    color: var(--accent2);
    margin-bottom: 20px;
    display: none;
  }
  .warning.show { display: block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">minutas<span>IA</span></div>
    <div class="status-pill" id="statusPill">
      <div class="dot"></div>
      <span id="statusText">En espera</span>
    </div>
  </header>

  <!-- Meeting Info -->
  <div class="meeting-info">
    <div class="field">
      <label>Nombre de la reunión</label>
      <input type="text" id="meetingName" placeholder="Ej: Revisión mensual Q1 2026">
    </div>
    <div class="field">
      <label>Participantes</label>
      <input type="text" id="participants" placeholder="Ej: Ana, Carlos, María">
    </div>
    <div class="field">
      <label>Fecha</label>
      <input type="text" id="meetingDate" placeholder="Ej: 28 marzo 2026">
    </div>
    <div class="field" style="grid-column:1/-1">
      <label>Enviar minutas a (correos separados por coma)</label>
      <input type="text" id="emailTo" placeholder="Ej: ana@empresa.com, carlos@empresa.com">
    </div>
  </div>

  <!-- Browser warning -->
  <div class="warning" id="browserWarning">
    ⚠️ Tu navegador no soporta reconocimiento de voz. Puedes escribir o pegar la transcripción manualmente en el campo de abajo.
  </div>

  <!-- Recorder -->
  <div class="recorder">
    <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
      <svg id="recordIcon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/></svg>
    </button>
    <div class="timer" id="timer">00:00</div>
    <div class="waveform" id="waveform">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="record-label">
      <strong id="recordBtnLabel">Iniciar grabación</strong>
      Presiona para grabar el audio de la reunión
    </div>
  </div>

  <!-- Transcript -->
  <div class="transcript-section">
    <div class="section-header">
      <div class="section-title">Transcripción</div>
      <button class="action-btn" style="flex:none;padding:6px 14px" onclick="clearTranscript()">Limpiar</button>
    </div>
    <textarea class="transcript-editable" id="transcriptArea"
      placeholder="La transcripción aparecerá aquí mientras grabas... También puedes escribir o pegar texto directamente."></textarea>
  </div>

  <!-- Generate -->
  <button class="generate-btn" id="generateBtn" onclick="generateMinutes()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </svg>
    Generar Minutas con IA
  </button>

  <!-- Output -->
  <div class="minutes-output" id="minutesOutput">
    <div class="section-header">
      <div class="section-title">Minutas generadas</div>
    </div>
    <div class="minutes-content" id="minutesContent"></div>
    <div class="output-actions" style="flex-wrap:wrap">
      <button class="action-btn" style="flex:1 1 100%;background:rgba(108,99,255,0.15);border-color:var(--accent);color:var(--accent);font-size:13px;padding:14px" onclick="sendEmail()">&#128231; Enviar por correo</button>
      <button class="action-btn" onclick="copyMinutes()">📋 Copiar texto</button>
      <button class="action-btn" onclick="downloadMinutes()">💾 Descargar .txt</button>
      <button class="action-btn" onclick="regenerate()">🔄 Regenerar</button>
    </div>
  </div>
</div>

<script>
// State
let isRecording = false;
let recognition = null;
let timerInterval = null;
let seconds = 0;
let fullTranscript = '';
let minutesText = '';

// Check speech recognition support
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
  document.getElementById('browserWarning').classList.add('show');
}

function setStatus(type, text) {
  const pill = document.getElementById('statusPill');
  const statusText = document.getElementById('statusText');
  pill.className = 'status-pill ' + type;
  statusText.textContent = text;
}

function toggleRecording() {
  if (!isRecording) startRecording();
  else stopRecording();
}

function startRecording() {
  isRecording = true;
  const btn = document.getElementById('recordBtn');
  btn.classList.add('recording');
  document.getElementById('recordBtnLabel').textContent = 'Detener grabación';
  document.getElementById('recordIcon').innerHTML = '<rect x="6" y="6" width="12" height="12" rx="2"/>';
  document.getElementById('waveform').classList.add('active');
  setStatus('active', 'Grabando...');

  // Timer
  seconds = 0;
  timerInterval = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    const timer = document.getElementById('timer');
    timer.textContent = `${m}:${s}`;
    timer.classList.add('active');
  }, 1000);

  // Speech recognition
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'es-ES';
    recognition.continuous = true;
    recognition.interimResults = true;

    let interim = '';
    recognition.onresult = (e) => {
      interim = '';
      let final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
        else interim += e.results[i][0].transcript;
      }
      if (final) fullTranscript += final;
      document.getElementById('transcriptArea').value = fullTranscript + interim;
    };

    recognition.onerror = (e) => {
      if (e.error !== 'aborted') {
        console.warn('Speech error:', e.error);
        setStatus('', 'Mic sin acceso - escribe manualmente');
      }
    };

    recognition.onend = () => {
      if (isRecording) recognition.start(); // restart if still recording
    };

    recognition.start();
  }
}

function stopRecording() {
  isRecording = false;
  if (recognition) { recognition.stop(); recognition = null; }
  clearInterval(timerInterval);

  const btn = document.getElementById('recordBtn');
  btn.classList.remove('recording');
  document.getElementById('recordBtnLabel').textContent = 'Iniciar grabación';
  document.getElementById('recordIcon').innerHTML = '<circle cx="12" cy="12" r="6"/>';
  document.getElementById('waveform').classList.remove('active');
  document.getElementById('timer').classList.remove('active');
  setStatus('', 'Grabación detenida');
}

function clearTranscript() {
  fullTranscript = '';
  document.getElementById('transcriptArea').value = '';
}

async function generateMinutes() {
  const transcript = document.getElementById('transcriptArea').value.trim();
  if (!transcript) {
    alert('Agrega o graba una transcripción primero.');
    return;
  }

  const name = document.getElementById('meetingName').value || 'Reunión';
  const participants = document.getElementById('participants').value || 'No especificados';
  const date = document.getElementById('meetingDate').value || new Date().toLocaleDateString('es-MX');

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Generando minutas...';
  setStatus('transcribing', 'Procesando con IA...');

  const prompt = `Eres un asistente experto en generar minutas de reuniones profesionales en español.

Datos de la reunión:
- Nombre: ${name}
- Participantes: ${participants}
- Fecha: ${date}

Transcripción:
"""
${transcript}
"""

Genera minutas profesionales y estructuradas en HTML (solo el contenido interno, sin <html> ni <body>). Usa estos elementos:
- <h1> para el título de la reunión
- <p class="meta"> para fecha y participantes
- <h2> para cada sección (RESUMEN EJECUTIVO, TEMAS TRATADOS, DECISIONES, ACUERDOS Y COMPROMISOS, PRÓXIMOS PASOS)
- <p> para párrafos
- <ul> y <li> para listas
- <strong> para resaltar nombres de responsables o fechas importantes

Sé conciso, profesional y preciso. Si falta información, infiere lo razonable del contexto.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const html = data.content?.map(b => b.text || '').join('') || '';

    // Store plain text version
    const temp = document.createElement('div');
    temp.innerHTML = html;
    minutesText = temp.textContent;

    document.getElementById('minutesContent').innerHTML = html;
    const output = document.getElementById('minutesOutput');
    output.classList.add('visible');
    output.scrollIntoView({ behavior: 'smooth', block: 'start' });
    setStatus('', 'Minutas listas ✓');
  } catch (err) {
    console.error(err);
    alert('Error al conectar con la IA. Verifica tu conexión.');
    setStatus('', 'Error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> Generar Minutas con IA`;
  }
}

function copyMinutes() {
  navigator.clipboard.writeText(minutesText || document.getElementById('minutesContent').textContent);
  const btn = event.target;
  btn.textContent = '✓ Copiado';
  setTimeout(() => btn.textContent = '📋 Copiar texto', 2000);
}

function downloadMinutes() {
  const text = minutesText || document.getElementById('minutesContent').textContent;
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `minutas-${Date.now()}.txt`;
  a.click();
}

function regenerate() {
  document.getElementById('minutesOutput').classList.remove('visible');
  setTimeout(generateMinutes, 300);
}


function sendEmail() {
  const text = minutesText || document.getElementById('minutesContent').textContent;
  if (!text.trim()) { alert('Primero genera las minutas.'); return; }
  const to = document.getElementById('emailTo').value.trim();
  const name = document.getElementById('meetingName').value || 'Reunion';
  const date = document.getElementById('meetingDate').value || '';
  const subject = encodeURIComponent('Minutas: ' + name + (date ? ' - ' + date : ''));
  const body = encodeURIComponent(text);
  const mailto = 'mailto:' + encodeURIComponent(to) + '?subject=' + subject + '&body=' + body;
  window.location.href = mailto;
}

// Set today's date as default
document.getElementById('meetingDate').value = new Date().toLocaleDateString('es-MX', {
  day: 'numeric', month: 'long', year: 'numeric'
});
</script>
</body>
</html>
